name: Database backup

# ROB-96 — Supabase's free tier has no point-in-time recovery, so a bad
# migration or accidental admin action has no automated way back. This
# runs entirely on GitHub's infra (not Supabase or Vercel), so it
# survives even total loss of the Supabase project itself, not just
# row-level corruption. Cost: $0 — GitHub Actions minutes and artifact
# storage are free for a repo this size, no new third-party service.
on:
  schedule:
    - cron: '0 9 * * *' # 9am UTC daily
  workflow_dispatch: {} # lets you trigger a backup on demand from the Actions tab

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install postgresql-client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Dump database
        # Passed as discrete PG* vars rather than a single connection-string
        # secret — a URI breaks if the DB password contains characters like
        # @, ?, or % that need percent-encoding (hit this in practice: a
        # raw password with a "?" in it was parsed as the start of a URI
        # query string). PGPASSWORD has no such parsing ambiguity.
        #
        # Connects via Supabase's Session Pooler, not the direct connection
        # host — the direct host resolves IPv6-only on Supabase's free tier,
        # and GitHub-hosted runners have no IPv6 route (hit this in
        # practice: "Network is unreachable"). The pooler is IPv4-reachable
        # and fine for an infrequent daily dump despite the extra hop.
        env:
          PGHOST: ${{ secrets.SUPABASE_DB_HOST }}
          PGUSER: ${{ secrets.SUPABASE_DB_USER }}
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: pg_dump -h "$PGHOST" -p 5432 -U "$PGUSER" -d postgres --no-owner --no-privileges -f backup.sql

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: backup.sql
          # Free-tier artifact storage is finite — 30 daily dumps of a
          # database this size is well within it, and gives a month of
          # rollback history without needing manual pruning.
          retention-days: 30
